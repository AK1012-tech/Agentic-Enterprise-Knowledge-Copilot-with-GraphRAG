services:
  api:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.api
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - neo4j
      - valkey

  streamlit:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.streamlit
    env_file: ../.env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
